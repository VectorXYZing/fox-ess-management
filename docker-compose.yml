services:
  fox-ess:
    # Use the pre-built image from GitHub Container Registry (no build required).
    # To build locally instead, comment the image line and uncomment build.
    image: ghcr.io/vectorxyzing/fox-ess-management:latest
    # build: .
    container_name: fox-ess
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      # Required
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      # Optional — override config.json values without editing the file.
      # Useful for Docker/NAS/cloud deployments where mounting a file is awkward.
      FOX_API_KEY:  ${FOX_API_KEY:-}
      DEVICE_SN:    ${DEVICE_SN:-}
      AEMO_REGION:  ${AEMO_REGION:-}
      TIMEZONE:     ${TIMEZONE:-}
      LATITUDE:     ${LATITUDE:-}
      LONGITUDE:    ${LONGITUDE:-}
      SYSTEM_KW:    ${SYSTEM_KW:-}
      BATTERY_KWH:  ${BATTERY_KWH:-}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/healthz', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    volumes:
      - ./config.json:/app/config.json
      - ./data:/app/data
      - ./state:/app/state
