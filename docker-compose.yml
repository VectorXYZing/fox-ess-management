services:
  fox-ess:
    build: .
    image: fox-ess-management:latest
    container_name: fox-ess
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-letpscontrol}
    volumes:
      - ./config.json:/app/config.json
      - ./data:/app/data
      - ./state:/app/state
